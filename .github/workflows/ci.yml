name: CI build check

# Validates that the SDK-style project builds and packages with `dotnet`.
# Acts as a pull-request gate (no release side effects).
on:
  pull_request:
    paths:
      - 'Directory.Build.props'
      - 'LcdFusion.slnx'
      - 'LcdFusion/**'
      - 'protocol/**'
      - 'tools/**'
      - 'pack.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Validate solution
        run: dotnet build LcdFusion.slnx -c Release

      - name: Build & package
        shell: pwsh
        run: ./pack.ps1 -Version 0.0.0-ci

      - uses: actions/upload-artifact@v4
        with:
          name: portable
          path: LcdFusion-0.0.0-ci-portable.zip

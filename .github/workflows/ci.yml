name: CI build check

# Validates the SDK-style project builds and packages with `dotnet`. Runs only on
# the modernization branch for now (no release side effects).
on:
  push:
    branches: [ modernize-sdk ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & package
        shell: pwsh
        run: ./pack.ps1 -Version 0.0.0-ci

      - uses: actions/upload-artifact@v4
        with:
          name: portable
          path: LcdFusion-0.0.0-ci-portable.zip
